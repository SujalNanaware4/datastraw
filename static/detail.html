<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details - Support CRM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-dark-900 { background-color: #0a0c14; }
        .bg-dark-800 { background-color: #161b22; }
        .bg-purple-accent { background-color: #6366f1; }
        .border-dark-700 { border-color: #30363d; }
    </style>
</head>
<body class="bg-dark-900 text-gray-300 min-h-screen flex">
    <!-- Left Sidebar -->
    <div class="w-64 border-r border-dark-700 flex flex-col fixed h-full">
        <div class="p-6 flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
            <h1 class="text-xl font-bold text-white">Datastraw CRM</h1>
        </div>
        <nav class="mt-8 flex-1">
            <a href="/" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Tickets Dashboard
            </a>
            <a href="/create" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Create Ticket
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 ml-64 mr-80 p-8">
        <a href="/" class="inline-flex items-center text-gray-500 hover:text-white mb-6 transition">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Back to Tickets List
        </a>

        <div id="ticketHeader"></div>

        <div id="ticketContent" class="space-y-6">
            <!-- Ticket subject and description -->
        </div>

        <!-- Conversation Section -->
        <div class="mt-12">
            <div class="flex items-center gap-2 mb-6">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                <h3 id="notesCountHeader" class="text-lg font-semibold text-white">Conversation & Internal Notes (0)</h3>
            </div>

            <!-- Add Note Form -->
            <div class="bg-dark-800 rounded-xl border border-dark-700 p-6 mb-8">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Add Agent Note / Activity log</label>
                <textarea id="noteText" rows="4" placeholder="Type your note or update details here..." 
                    class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition resize-none mb-4"></textarea>
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-500">Change Status:</span>
                        <select id="statusSelect" class="bg-dark-900 border border-dark-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition">
                            <option value="Open">Open</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                    <button onclick="updateTicket()" class="bg-purple-accent hover:bg-opacity-90 text-white px-6 py-2 rounded-lg font-semibold transition">
                        Save Changes
                    </button>
                </div>
            </div>

            <!-- Notes List -->
            <div id="notesList" class="space-y-4"></div>

            <!-- Simulated Emails -->
            <div class="mt-12 bg-dark-800 rounded-xl border border-dark-700 overflow-hidden">
                <div class="px-6 py-4 border-b border-dark-700 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        <h4 id="emailCountHeader" class="font-semibold text-white">Simulated Transactional Emails Sent (0)</h4>
                    </div>
                    <button onclick="clearEmails()" class="text-xs font-semibold px-3 py-1 bg-dark-900 border border-dark-700 rounded text-gray-300 hover:bg-purple-accent hover:border-purple-accent transition">
                        Clear Log
                    </button>
                </div>
                <div id="emailsList" class="p-6">
                    <div class="text-center text-gray-500 text-sm">
                        No emails sent yet. Submit a ticket or modify a status to trigger a simulated notification!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Sidebar -->
    <div id="rightSidebar" class="w-80 border-l border-dark-700 fixed right-0 h-full p-8 bg-dark-900 overflow-y-auto">
        <!-- Customer Profile & Operational Details will be injected here -->
    </div>

    <script>
        const ticketId = window.location.pathname.split('/').pop();
        
        async function loadTicket() {
            const res = await fetch(`/api/tickets/${ticketId}`);
            if (!res.ok) {
                document.body.innerHTML = '<div class="flex items-center justify-center h-screen text-white">Ticket not found</div>';
                return;
            }
            const ticket = await res.json();
            renderTicket(ticket);
            loadEmails();
        }

        async function loadEmails() {
            const res = await fetch(`/api/tickets/${ticketId}/emails`);
            const emails = await res.json();
            
            document.getElementById('emailCountHeader').innerText = `Simulated Transactional Emails Sent (${emails.length})`;
            
            if (emails.length === 0) {
                document.getElementById('emailsList').innerHTML = `
                    <div class="text-center text-gray-500 text-sm">
                        No emails sent yet. Submit a ticket or modify a status to trigger a simulated notification!
                    </div>
                `;
                return;
            }
            
            document.getElementById('emailsList').innerHTML = emails.map(email => `
                <div class="bg-dark-900 rounded-lg p-6 border-l-4 border-indigo-500 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs text-gray-400">To: ${email.to_email}</span>
                        <span class="text-[10px] text-gray-500">${new Date(email.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })}</span>
                    </div>
                    <h5 class="text-sm font-semibold text-white mb-2">${email.subject}</h5>
                    <div class="text-xs text-gray-400 whitespace-pre-line">
                        ${email.body}
                    </div>
                </div>
            `).join('');
        }

        async function clearEmails() {
            if (confirm('Are you sure you want to clear all emails?')) {
                await fetch('/api/emails', { method: 'DELETE' });
                loadEmails();
            }
        }

        function renderTicket(ticket) {
            const submittedDate = new Date(ticket.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
            const updatedDate = new Date(ticket.updated_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });

            const categoryColor = {
                'Billing': 'text-pink-500 bg-pink-500/10',
                'Technical': 'text-purple-400 bg-purple-400/10',
                'General Inquiry': 'text-emerald-400 bg-emerald-400/10'
            }[ticket.category] || 'text-blue-400 bg-blue-400/10';

            const priorityColor = {
                'High': 'text-red-500 bg-red-500/10',
                'Medium': 'text-orange-400 bg-orange-400/10',
                'Low': 'text-blue-400 bg-blue-400/10'
            }[ticket.priority] || 'text-gray-400 bg-gray-400/10';

            // Header
            document.getElementById('ticketHeader').innerHTML = `
                <div class="flex justify-between items-start mb-8">
                    <div class="flex items-center gap-4">
                        <h2 class="text-xl font-bold text-white font-mono">${ticket.ticket_id}</h2>
                        <div class="flex gap-2">
                            <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase ${priorityColor}">${ticket.priority} Priority</span>
                            <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase ${categoryColor}">${ticket.category}</span>
                            <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase bg-dark-800 border border-dark-700 text-gray-300">${ticket.status}</span>
                        </div>
                    </div>
                </div>
            `;

            // Main Content
            document.getElementById('ticketContent').innerHTML = `
                <div class="bg-dark-800 rounded-xl border border-dark-700 p-8">
                    <h1 class="text-3xl font-bold text-white mb-4">${ticket.subject}</h1>
                    <div class="flex gap-4 text-xs text-gray-500 mb-8">
                        <span>Submitted: ${submittedDate}</span>
                        <span>Last Updated: ${updatedDate}</span>
                    </div>
                    <div class="space-y-4">
                        <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Description</h4>
                        <div class="bg-dark-900 rounded-lg p-6 border border-dark-700 text-gray-300 leading-relaxed">
                            ${ticket.description}
                        </div>
                    </div>
                </div>
            `;

            // Status select
            document.getElementById('statusSelect').value = ticket.status;
            document.getElementById('statusSelect').dataset.initial = ticket.status;

            // Notes
            document.getElementById('notesCountHeader').innerText = `Conversation & Internal Notes (${ticket.notes.length})`;
            document.getElementById('notesList').innerHTML = ticket.notes.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).map(note => `
                <div class="flex gap-4 p-4 rounded-xl hover:bg-dark-800 transition group">
                    <div class="w-2 h-2 mt-2 rounded-full bg-blue-500 flex-shrink-0"></div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold text-blue-500 uppercase">Agent Note</span>
                            <span class="text-[10px] text-gray-500 uppercase">${new Date(note.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}</span>
                        </div>
                        <p class="text-sm text-gray-300">${note.note_text}</p>
                    </div>
                </div>
            `).join('');

            // Right Sidebar
            document.getElementById('rightSidebar').innerHTML = `
                <div class="mb-12">
                    <h4 class="text-lg font-bold text-white mb-6">Customer Profile</h4>
                    <div class="space-y-6">
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Name</p>
                            <p class="text-white font-medium">${ticket.customer_name}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Email</p>
                            <p class="text-white font-medium">${ticket.customer_email}</p>
                        </div>
                    </div>
                </div>

                <div>
                    <h4 class="text-lg font-bold text-white mb-6">Operational Details</h4>
                    <div class="space-y-6">
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Category</p>
                            <p class="text-white font-medium">${ticket.category}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Priority</p>
                            <p class="text-white font-medium">${ticket.priority}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Status</p>
                            <p class="text-white font-medium">${ticket.status}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function updateTicket() {
            const status = document.getElementById('statusSelect').value;
            const notes = document.getElementById('noteText').value;
            
            if (!notes.trim() && status === document.getElementById('statusSelect').dataset.initial) {
                return;
            }

            const updateData = { status };
            if (notes.trim()) updateData.notes = notes.trim();
            
            const res = await fetch(`/api/tickets/${ticketId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updateData)
            });
            
            if (res.ok) {
                document.getElementById('noteText').value = '';
                loadTicket();
            }
        }

        loadTicket();
    </script>
</body>
</html>
