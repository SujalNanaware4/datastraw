<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Ticket - Datastraw CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-dark-900 { background-color: #0a0c14; }
        .bg-dark-800 { background-color: #161b22; }
        .bg-purple-accent { background-color: #6366f1; }
        .border-dark-700 { border-color: #30363d; }
    </style>
</head>
<body class="bg-dark-900 text-gray-300 min-h-screen flex items-center justify-center p-4">
    <div class="bg-dark-800 w-full max-w-2xl rounded-2xl shadow-2xl border border-dark-700 overflow-hidden">
        <div class="p-8 border-b border-dark-700 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-white">Create New Ticket</h1>
            <a href="/" class="text-gray-500 hover:text-white transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </a>
        </div>
        
        <form id="ticketForm" class="p-8">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Customer Name *</label>
                    <input type="text" id="customerName" required placeholder="John Doe"
                        class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Customer Email *</label>
                    <input type="email" id="customerEmail" required placeholder="john.doe@example.com"
                        class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Category</label>
                    <select id="category" class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition appearance-none">
                        <option value="General Inquiry">General Inquiry</option>
                        <option value="Technical">Technical</option>
                        <option value="Billing">Billing</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Priority</label>
                    <select id="priority" class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition appearance-none">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Subject *</label>
                <input type="text" id="subject" required placeholder="Brief summary of the issue"
                    class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition">
            </div>

            <div class="mb-8">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Detailed Description *</label>
                <textarea id="description" rows="5" required placeholder="Describe the problem in detail..."
                    class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-purple-accent transition resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-4">
                <a href="/" class="px-8 py-2.5 rounded-lg font-semibold text-gray-400 hover:text-white hover:bg-dark-900 transition">Cancel</a>
                <button type="submit" class="bg-purple-accent hover:bg-opacity-90 text-white px-8 py-2.5 rounded-lg font-semibold transition">
                    Submit Ticket
                </button>
            </div>
        </form>

        <div id="successMessage" class="hidden absolute inset-0 bg-dark-800 bg-opacity-95 flex flex-col items-center justify-center p-8 text-center">
            <div class="w-16 h-16 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2">Ticket Created!</h3>
            <p class="text-gray-500 mb-8">Your support ticket has been submitted successfully.</p>
            <p class="text-sm text-purple-accent">Redirecting to dashboard...</p>
        </div>
    </div>

    <script>
        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ticket = {
                customer_name: document.getElementById('customerName').value,
                customer_email: document.getElementById('customerEmail').value,
                category: document.getElementById('category').value,
                priority: document.getElementById('priority').value,
                subject: document.getElementById('subject').value,
                description: document.getElementById('description').value
            };
            
            const res = await fetch('/api/tickets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ticket)
            });
            
            if (res.ok) {
                document.getElementById('successMessage').classList.remove('hidden');
                setTimeout(() => window.location.href = '/', 1500);
            }
        });
    </script>
</body>
</html>
